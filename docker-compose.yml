services:
  postgres:
    image: postgres:16-alpine
    container_name: fastsub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"

  pgbouncer:
    build:
      context: ./deploy/pgbouncer
      dockerfile: Dockerfile
    container_name: fastsub_pgbouncer
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:56432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: fastsub_redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_api
    restart: unless-stopped
    env_file: .env
    command: >
      uvicorn src.api.app:app
      --host 0.0.0.0
      --port 8000
      --workers ${API_WORKERS:-4}
      --proxy-headers
      --forwarded-allow-ips=*
    ports:
      - "127.0.0.1:58000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  main_bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_main_bot
    restart: unless-stopped
    env_file: .env
    command: python -m src.bots.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin_bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_admin_bot
    restart: unless-stopped
    env_file: .env
    command: python -m src.bots.admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  checker_bots:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_checker_bots
    restart: unless-stopped
    env_file: .env
    command: python -m src.bots.checker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_worker
    restart: unless-stopped
    env_file: .env
    command: taskiq worker src.workers.broker:broker --workers 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: fastsub_scheduler
    restart: unless-stopped
    env_file: .env
    command: taskiq scheduler src.workers.broker:scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: fastsub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  postgres_data:
    name: fastsub_postgres_data
  redis_data:
    name: fastsub_redis_data
