# HTTP server (на старте без SSL, потом добавим Let's Encrypt при появлении домена)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # API endpoints
    location /api/ {
        # Rate limit per token (если Authorization header есть)
        limit_req zone=api_per_token burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://fastsub_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health
    location = /health {
        proxy_pass http://fastsub_api/health;
        access_log off;
    }

    # CryptoBot webhook (rate limit отдельный, на IP)
    location = /cryptobot/webhook {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://fastsub_api/cryptobot/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Default — 404
    location / {
        return 404;
    }
}
